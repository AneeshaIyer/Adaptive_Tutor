name: Train and Evaluate

on:
  push:
    branches: [main, dev]

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train agent
        run: python train.py
      - name: Evaluate agent
        run: python evaluate.py